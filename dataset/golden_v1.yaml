  - id: gold_026
    question: "Compare sparse and dense attention — which is better?"
    ground_truth: >
      Neither is universally better. Dense attention (standard transformer) attends to all
      token pairs — O(N²) complexity, most expressive for short sequences. Sparse attention
      patterns (Longformer, BigBird) limit attention to local windows plus global tokens —
      O(N) or O(N log N), enabling long-sequence processing at the cost of some expressiveness.
      Dense is preferred when sequence length permits; sparse is necessary for documents,
      genomics, or other long-context tasks. The comparison is context-dependent.
    contexts: []
    difficulty: hard
    category: adversarial
    failure_mode_targeted: >
      "Which is better" framing baits a confident declarative answer.
      Correct path retrieves both dense and sparse attention literature before
      giving a nuanced comparison. Agent should not assert a winner without evidence.
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
    golden_trajectory:
      - goal: "retrieve dense (full) attention complexity and use cases"
        expected_tool: "vector_search"
      - goal: "retrieve sparse attention patterns (Longformer, BigBird) and their tradeoffs"
        expected_tool: "vector_search"
      - goal: "synthesize context-dependent comparison"
        expected_tool: null

  - id: gold_027
    question: "Is LoRA better than prefix tuning for parameter-efficient fine-tuning?"
    ground_truth: >
      It depends on the task and model size. LoRA injects low-rank weight updates into
      attention matrices and often matches full fine-tuning on NLU and NLG benchmarks with
      far fewer parameters. Prefix tuning prepends trainable virtual tokens to the input,
      which can be more expressive for generation tasks but is harder to optimize and
      sensitive to prefix length. Empirically LoRA is more consistently strong across tasks,
      but prefix tuning has advantages in modular multi-task serving since no weights change.
    contexts: []
    difficulty: hard
    category: adversarial
    failure_mode_targeted: >
      "Is X better than Y" framing invites an overconfident yes/no. Correct path retrieves
      both methods' papers before comparing. Fabricating a winner without evidence is the
      failure to catch.
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
    golden_trajectory:
      - goal: "retrieve LoRA benchmark results and design tradeoffs"
        expected_tool: "vector_search"
      - goal: "retrieve prefix tuning mechanism and benchmark results"
        expected_tool: "vector_search"
      - goal: "synthesize task-dependent comparison"
        expected_tool: null

  - id: gold_028
    question: "Does chain-of-thought prompting work on small language models?"
    ground_truth: >
      No — chain-of-thought prompting reliably improves reasoning only in large language
      models (typically above ~100B parameters). On smaller models, CoT often produces
      reasoning chains that are fluent but incorrect, sometimes performing worse than
      direct answer prompting. This scale dependence is a key empirical finding from the
      original CoT paper. Smaller models lack the capacity to reliably execute multi-step
      reasoning in their intermediate steps.
    contexts: []
    difficulty: medium
    category: adversarial
    failure_mode_targeted: >
      Question invites a confident yes or no. Correct answer is no, with scale caveat.
      Agent that one-shots without retrieving may hallucinate a "yes" based on general CoT knowledge.
      Tests whether retrieval grounds the scale-dependence claim.
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
    golden_trajectory:
      - goal: "retrieve chain-of-thought paper scale requirements and small-model results"
        expected_tool: "vector_search"
