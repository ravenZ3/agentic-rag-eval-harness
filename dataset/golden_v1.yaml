  - id: gold_013
    question: "What architectural differences between BERT and GPT explain BERT's strength in understanding tasks and GPT's strength in generation?"
    ground_truth: >
      BERT is an encoder-only model trained with masked language modeling (MLM), which forces
      bidirectional attention — every token attends to all others. This makes BERT representations
      deeply contextualized, ideal for classification and span extraction.
      GPT is a decoder-only model trained with causal (next-token) language modeling, attending
      only to past tokens. This makes it naturally suited for left-to-right generation.
      BERT cannot generate autoregressively; GPT cannot leverage right-context.
    contexts: []
    difficulty: hard
    category: multi_hop
