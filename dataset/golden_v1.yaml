  - id: gold_016
    question: "How does speculative decoding speed up LLM inference and what is the role of the draft model?"
    ground_truth: >
      Speculative decoding uses a small, fast draft model to generate several candidate tokens,
      then verifies them in parallel with the large target model using a single forward pass.
      Tokens accepted by the target model are kept; the first rejected token triggers regeneration.
      The speedup comes from replacing multiple sequential target-model forward passes with one
      parallel verification pass, achieving 2-3x latency reduction with no output quality loss.
    contexts: []
    difficulty: medium
    category: multi_hop
    failure_mode_targeted: "requires retrieving speculative decoding paper and understanding the draft-model role"
