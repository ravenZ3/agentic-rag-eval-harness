  - id: gold_001
    question: "What is the transformer attention mechanism?"
    ground_truth: >
      The transformer attention mechanism computes a weighted sum of value vectors,
      where weights are derived from the dot-product similarity between query and key vectors,
      scaled and passed through a softmax. This allows each token to selectively attend
      to all other tokens in the sequence.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline sanity check — agent should retrieve and answer in one step"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_002
    question: "What is LoRA and how does it reduce GPU memory during fine-tuning?"
    ground_truth: >
      LoRA (Low-Rank Adaptation) freezes the pretrained model weights and injects trainable
      low-rank decomposition matrices into each transformer layer. Instead of updating the
      full weight matrix W, it learns two small matrices A and B such that the update is AB^T.
      This reduces trainable parameters by orders of magnitude, cutting optimizer state and
      gradient memory substantially.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline — should retrieve LoRA paper and answer directly"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_003
    question: "What is knowledge distillation in deep learning?"
    ground_truth: >
      Knowledge distillation trains a compact student model to mimic a larger teacher model
      by matching the teacher's soft output probabilities rather than hard labels.
      The soft targets carry information about inter-class similarities that one-hot labels
      discard, enabling the student to generalize better than training on labels alone.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline sanity check"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_004
    question: "What is retrieval-augmented generation (RAG)?"
    ground_truth: >
      Retrieval-augmented generation (RAG) augments a language model by first retrieving
      relevant documents from an external corpus, then conditioning the generator on both
      the original query and the retrieved passages. This grounds generation in real evidence,
      reducing hallucination and enabling the model to answer questions beyond its training data.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline — tests basic RAG self-knowledge"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_005
    question: "What is the role of the feed-forward sublayer in a transformer block?"
    ground_truth: >
      The feed-forward sublayer in each transformer block applies two linear transformations
      with a non-linearity (typically ReLU or GELU) in between, applied independently to each
      position. It is thought to store factual associations learned during training and acts
      as a key-value memory over the input representation.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "tests whether agent retrieves transformer architecture papers"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_006
    question: "What is RLHF (reinforcement learning from human feedback)?"
    ground_truth: >
      RLHF fine-tunes a language model using human preference data. A reward model is first
      trained on human comparisons of model outputs. The language model is then optimized
      with PPO (proximal policy optimization) to maximize the reward model's score while
      staying close to the original policy via a KL-divergence penalty.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline — single-concept retrieval"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_007
    question: "What is the difference between encoder-only and decoder-only transformer architectures?"
    ground_truth: >
      Encoder-only models (e.g. BERT) process the full input bidirectionally, attending to
      all tokens in both directions — suited for understanding tasks like classification and NER.
      Decoder-only models (e.g. GPT) use causal (unidirectional) attention, only attending
      to past tokens — suited for autoregressive generation. Encoder-decoder models (e.g. T5)
      combine both for seq2seq tasks.
    contexts: []
    difficulty: medium
    category: single_hop
    failure_mode_targeted: "tests ability to retrieve and contrast architecture families"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_008
    question: "What is Flash Attention and why is it faster than standard attention?"
    ground_truth: >
      Flash Attention is an IO-aware exact attention algorithm that restructures the attention
      computation to minimize reads and writes to GPU HBM (high bandwidth memory). It tiles
      the attention computation into blocks that fit in SRAM, avoiding the materialization of
      the full N×N attention matrix. This reduces memory usage from O(N²) to O(N) and
      achieves significant wall-clock speedups over standard attention, especially for long sequences.
    contexts: []
    difficulty: medium
    category: single_hop
    failure_mode_targeted: "tests retrieval of specific optimization paper"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_009
    question: "What is a mixture-of-experts (MoE) layer in a language model?"
    ground_truth: >
      A mixture-of-experts layer replaces a single feed-forward sublayer with N parallel
      expert networks and a learned router that activates only the top-k experts for each
      token. This allows the model to scale parameter count without proportionally increasing
      FLOPs, since only a fraction of parameters are active per forward pass.
    contexts: []
    difficulty: medium
    category: single_hop
    failure_mode_targeted: "tests single-document retrieval on a specific architecture concept"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

  - id: gold_010
    question: "What is in-context learning in large language models?"
    ground_truth: >
      In-context learning (ICL) is the ability of large language models to perform tasks
      by conditioning on a few input-output examples provided in the prompt, without any
      gradient updates. The model infers the task pattern from the prompt examples at
      inference time. It emerges at scale and does not modify the model weights.
    contexts: []
    difficulty: easy
    category: single_hop
    failure_mode_targeted: "baseline — tests basic LLM capability concept retrieval"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"

