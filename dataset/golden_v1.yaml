        expected_tool: null

  - id: gold_012
    question: "Compare retrieval strategies in RAG-Token vs RAG-Sequence and explain when each is preferred."
    ground_truth: >
      RAG-Sequence retrieves once per query and uses the same set of documents to generate
      the entire output — simpler but the retrieved documents must cover the full answer.
      RAG-Token retrieves at every generation step, allowing different tokens to be grounded
      in different documents — more expressive but computationally expensive and harder to train.
      RAG-Sequence is preferred when a single retrieval covers the query well; RAG-Token is
      preferred for long-form outputs requiring diverse evidence across tokens.
    contexts: []
    difficulty: hard
    category: multi_hop
    failure_mode_targeted: "baits one-shot comparison; correct path retrieves each variant separately"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
