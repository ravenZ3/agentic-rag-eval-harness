  - id: gold_011
    question: "How does RLHF differ from supervised fine-tuning in terms of the training signal and the role of the reward model?"
    ground_truth: >
      Supervised fine-tuning (SFT) uses human-written demonstrations as direct training targets
      with cross-entropy loss — the signal is whether the model produces the labeled output.
      RLHF uses a reward model trained on human preference comparisons as an indirect signal:
      PPO optimizes the policy to maximize reward scores rather than imitating fixed examples.
      The reward model is the key differentiator — it generalizes human preferences to new
      outputs that were never labeled, while SFT is limited to imitating the demonstration set.
    contexts: []
    difficulty: hard
    category: multi_hop
    failure_mode_targeted: "agent one-shots this without retrieving both SFT and RLHF sources"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
