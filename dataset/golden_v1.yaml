  - id: gold_020
    question: "What is the difference between token-level and sequence-level knowledge distillation for language models?"
    ground_truth: >
      Token-level distillation trains the student to match the teacher's per-token output
      distribution at each position using KL divergence — it transfers the teacher's uncertainty
      across the vocabulary at every step. Sequence-level distillation generates output sequences
      from the teacher and trains the student on these as pseudo-labels, which is computationally
      cheaper but loses the soft-label signal. Token-level is more information-dense but requires
      a forward pass from the teacher for every training example.
    contexts: []
    difficulty: hard
    category: multi_hop
    failure_mode_targeted: "requires separate retrieval of token-level and sequence-level distillation methods"
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
