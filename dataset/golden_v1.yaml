  - id: gold_014
    question: "How do LoRA and full fine-tuning differ in their effect on the model's weight matrices and generalization?"
    ground_truth: >
      Full fine-tuning updates all model weights, allowing complete adaptation but risking
      catastrophic forgetting of pretrained knowledge and requiring storing a full model copy
      per task. LoRA constrains updates to low-rank products of small matrices, preserving
      most pretrained weights unchanged. This regularization often improves generalization on
      low-data regimes and enables cheap multi-task serving by swapping adapter weights.
    contexts: []
    difficulty: hard
    category: multi_hop
