  - id: gold_018
    question: "What are the key differences between PPO and DPO as alignment algorithms for LLMs?"
    ground_truth: >
      PPO (Proximal Policy Optimization) requires training a separate reward model and uses
      online RL with policy gradient updates, making it complex and memory-intensive.
      DPO (Direct Preference Optimization) re-frames preference learning as a supervised
      classification problem on preference pairs, eliminating the reward model and online
      RL entirely. DPO is simpler to implement and more stable, but requires offline
      preference data and cannot incorporate real-time human feedback signals.
    contexts: []
