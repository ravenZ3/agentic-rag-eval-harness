  - id: gold_017
    question: "How does chain-of-thought prompting improve reasoning in LLMs, and what conditions are required for it to work?"
    ground_truth: >
      Chain-of-thought (CoT) prompting asks the model to generate intermediate reasoning steps
      before producing a final answer. This improves performance on multi-step arithmetic,
      commonsense, and symbolic reasoning tasks. CoT is most effective on large models
      (typically >100B parameters) — smaller models do not reliably benefit and can produce
      plausible but incorrect chains. Few-shot CoT provides example reasoning traces; zero-shot
      CoT elicits reasoning with "Let's think step by step."
    contexts: []
