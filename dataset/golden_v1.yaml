  - id: gold_019
    question: "How does the training objective of masked language modeling (MLM) differ from causal language modeling (CLM), and how does this affect the learned representations?"
    ground_truth: >
      MLM (used in BERT) randomly masks input tokens and trains the model to predict them
      using bidirectional context — all tokens attend to all others. CLM (used in GPT) trains
      the model to predict each next token from only the preceding tokens using causal masking.
      MLM produces deeply bidirectional representations rich in contextual information per token,
      favoring discriminative tasks. CLM produces representations optimized for sequential
      prediction, making the model naturally generative. MLM cannot be used for generation;
      CLM representations see only left context at each position.
    contexts: []
    difficulty: hard
    category: multi_hop
    failure_mode_targeted: "requires retrieving MLM and CLM objectives from separate papers"
