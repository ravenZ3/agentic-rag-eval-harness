  - id: gold_015
    question: "What are the tradeoffs between sparse retrieval (BM25) and dense retrieval (DPR) for RAG systems?"
    ground_truth: >
      BM25 is a term-frequency-based sparse retrieval method — fast, interpretable, requires
      no training, and strong when the query shares exact vocabulary with the document.
      DPR (Dense Passage Retrieval) encodes queries and passages into dense vectors using
      fine-tuned encoders, capturing semantic similarity beyond vocabulary overlap.
      DPR outperforms BM25 on open-domain QA benchmarks but requires training data and
      an approximate nearest-neighbor index. Hybrid approaches that combine both often
      outperform either alone.
    contexts: []
    difficulty: hard
    category: multi_hop
    failure_mode_targeted: "requires retrieving BM25 and DPR separately before comparing"
