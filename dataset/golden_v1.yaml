  - id: gold_030
    question: "How many layers does GPT-3 have and why was that number chosen?"
    ground_truth: >
      GPT-3 has 96 transformer layers (in the largest 175B parameter variant). The architecture
      was scaled from GPT-2 following empirical scaling laws showing that compute-optimal
      training requires scaling model size, dataset size, and training compute together.
      The specific depth was chosen as part of a width-depth tradeoff to fit training on
      available hardware. The 'why' beyond hardware and scaling law constraints was not
      formally justified in the GPT-3 paper — it was an engineering decision.
    contexts: []
    difficulty: medium
    category: adversarial
    failure_mode_targeted: >
      The "why" half of the question is partially unanswerable — the paper doesn't fully justify
      the specific choice. Agent must retrieve GPT-3 architecture details but acknowledge
      the 'why' is not fully documented, rather than fabricating a principled justification.
    corpus_hash: "PLACEHOLDER_UPDATE_AFTER_INGEST"
